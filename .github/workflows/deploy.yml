name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ai-agent-hackathon-2026
  GAR_LOCATION: asia-northeast1
  REPOSITORY: hackathon-repo
  SERVICE: hackathon-pm-agent
  REGION: asia-northeast1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # WIF連携を行うために、GitHub Actions側に一時的なトークン発行権限（id-token: write）を与えます
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ★キーレス（WIF）認証の実行ステップ
    - name: Google Auth via WIF
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker push
      run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
        docker build -t $TAG .
        docker push $TAG

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE }} \
          --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --allow-unauthenticated
          --service-account ${{ vars.GCP_SERVICE_ACCOUNT }}
