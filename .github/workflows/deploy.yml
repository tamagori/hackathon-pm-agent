name: Deploy to Cloud Run

on:
  push:
    branches:
      - main  # mainブランチにプッシュされたら自動起動

env:
  PROJECT_ID: ai-agent-hackathon-2026
  GAR_LOCATION: asia-northeast1             # Artifact Registryのリージョン
  REPOSITORY: hackathon-repo                # Artifact Registryのリポジトリ名
  SERVICE: hackathon-pm-agent               # Cloud Runのサービス名（任意）
  REGION: asia-northeast1                   # Cloud Runをデプロイするリージョン

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ★注意：今回は最短で開通させるため、最もシンプルな「サービスアカウントのキー」による認証を行います。
    # 認証用の秘密鍵は後ほどGitHubのSecretsに安全に保管します。
    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker push
      run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
        docker build -t $TAG .
        docker push $TAG

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE }} \
          --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --allow-unauthenticated
